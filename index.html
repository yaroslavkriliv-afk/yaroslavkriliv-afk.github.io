<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrofia Whoosh</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: system-ui; padding: 16px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 12px; border-radius: 12px; margin-bottom: 12px; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 10px 16px; border-radius: 8px; margin: 4px; }
        .balance { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div class="card">
            <div>💰 Баланс: <span id="balance">0</span> руб.</div>
            <button id="topupBtn">Пополнить</button>
        </div>
        <div class="card">
            <h3>Купить номер</h3>
            <select id="tariffSelect">
                <option value="20min">20 минут — 43 руб.</option>
            </select>
            <input type="text" id="promoCode" placeholder="Промокод (необязательно)">
            <button id="buyCryptoBtn">Купить за USDT</button>
            <button id="buyBalanceBtn">Купить с баланса</button>
            <button id="buyManualBtn">Перевод на карту</button>
        </div>
        <div id="orderStatus"></div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe.user?.id;

        async function apiCall(endpoint, method='GET', body=null) {
            const opts = { method, headers: {'Content-Type': 'application/json'} };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(`https://github.com/yaroslavkriliv-afk/GrandSMS.git/api/${endpoint}?user_id=${userId}`, opts);
            return res.json();
        }

        async function loadProfile() {
            const data = await apiCall('user');
            document.getElementById('balance').innerText = data.balance;
        }

        document.getElementById('buyBalanceBtn').onclick = async () => {
            const res = await apiCall('create_order', 'POST', {
                tariff_id: document.getElementById('tariffSelect').value,
                payment_method: 'balance',
                promo_code: document.getElementById('promoCode').value
            });
            if (res.success) {
                document.getElementById('orderStatus').innerHTML = `✅ Заказ оплачен, номер: +${res.phone}`;
                loadProfile();
            } else {
                alert(res.error);
            }
        };

        loadProfile();
    </script>
</body>
</html>
